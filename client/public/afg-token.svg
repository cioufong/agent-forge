  <rect x="10" y="13" width="12" height="2" fill="#0284c7"/>
  <!-- Pavilion -->
  <rect x="11" y="15" width="10" height="2" fill="#0369a1"/>
  <rect x="12" y="17" width="8" height="2" fill="#0369a1"/>
  <rect x="13" y="19" width="6" height="2" fill="#075985"/>
  <rect x="14" y="21" width="4" height="2" fill="#075985"/>
  <!-- Bottom point -->
  <rect x="15" y="23" width="2" height="2" fill="#0c4a6e"/>
  <!-- Facet highlights (left) -->
  <rect x="13" y="7" width="2" height="2" fill="#bae6fd"/>
  <rect x="11" y="9" width="2" height="2" fill="#7dd3fc"/>
  <rect x="10" y="11" width="2" height="2" fill="#38bdf8"/>
