<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#101020"/>
      <stop offset="100%" stop-color="#06060c"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#8ec5fc"/>
      <stop offset="40%" stop-color="#4a8fe7"/>
      <stop offset="100%" stop-color="#1a3a7a"/>
    </radialGradient>
    <radialGradient id="orbInner" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a8fe7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a8fe7" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="g4"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Bronze frame -->
  <rect x="8" y="8" width="384" height="384" rx="16" fill="none" stroke="#CD7F32" stroke-width="2" opacity="0.5"/>

  <!-- Aura -->
  <circle cx="200" cy="185" r="140" fill="url(#aura)"/>

  <!-- Orbit ring -->
  <ellipse cx="200" cy="185" rx="120" ry="35" fill="none" stroke="#4a8fe7" stroke-width="0.8" opacity="0.25" transform="rotate(-20,200,185)"/>

  <!-- Main orb glow -->
  <circle cx="200" cy="185" r="85" fill="#4a8fe7" opacity="0.08" filter="url(#g4)"/>
  <circle cx="200" cy="185" r="70" fill="#4a8fe7" opacity="0.12" filter="url(#g3)"/>

  <!-- Main orb -->
  <circle cx="200" cy="185" r="65" fill="url(#orb)"/>
  <circle cx="200" cy="185" r="65" fill="url(#orbInner)"/>

  <!-- Orb surface highlight -->
  <ellipse cx="182" cy="162" rx="28" ry="20" fill="#fff" opacity="0.12" transform="rotate(-15,182,162)"/>
  <ellipse cx="178" cy="158" rx="12" ry="8" fill="#fff" opacity="0.2" transform="rotate(-15,178,158)"/>

  <!-- Math symbol inside orb -->
  <text x="200" y="195" fill="#fff" font-size="36" text-anchor="middle" font-family="serif" opacity="0.5">&#x03A3;</text>

  <!-- Simple orbiting particle (Common = 1 particle) -->
  <circle cx="310" cy="170" r="4" fill="#8ec5fc" filter="url(#g1)" opacity="0.8"/>
  <circle cx="310" cy="170" r="2" fill="#fff" opacity="0.9"/>

  <!-- Subtle ground reflection -->
  <ellipse cx="200" cy="310" rx="60" ry="8" fill="#4a8fe7" opacity="0.06" filter="url(#g2)"/>

  <!-- Label area -->
  <text x="200" y="350" fill="#CD7F32" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Agent #7</text>
  <text x="200" y="370" fill="#556" font-size="10" text-anchor="middle" font-family="monospace">Lv.1 Bronze | Math | Common</text>
</svg>