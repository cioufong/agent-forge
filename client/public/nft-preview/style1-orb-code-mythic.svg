<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0c0606"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffd4a5"/>
      <stop offset="30%" stop-color="#ff6b6b"/>
      <stop offset="70%" stop-color="#cc2a2a"/>
      <stop offset="100%" stop-color="#6b0a0a"/>
    </radialGradient>
    <radialGradient id="orbInner" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="g4"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="g5"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Gold frame ornate -->
  <rect x="4" y="4" width="392" height="392" rx="16" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.8" filter="url(#g5)"/>
  <rect x="4" y="4" width="392" height="392" rx="16" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.9"/>
  <rect x="12" y="12" width="376" height="376" rx="12" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.35"/>
  <!-- Corner ornaments -->
  <polygon points="18,18 28,10 28,26" fill="#FFD700" opacity="0.6"/>
  <polygon points="382,18 372,10 372,26" fill="#FFD700" opacity="0.6"/>
  <polygon points="18,382 28,374 28,390" fill="#FFD700" opacity="0.6"/>
  <polygon points="382,382 372,374 372,390" fill="#FFD700" opacity="0.6"/>

  <!-- Mythic energy streams in background -->
  <g opacity="0.05">
    <path d="M0,80 Q100,120 200,80 Q300,40 400,80" stroke="#FFD700" stroke-width="3" fill="none"/>
    <path d="M0,160 Q100,200 200,160 Q300,120 400,160" stroke="#ff6b6b" stroke-width="2" fill="none"/>
    <path d="M0,240 Q100,200 200,240 Q300,280 400,240" stroke="#FFD700" stroke-width="3" fill="none"/>
    <path d="M0,320 Q100,280 200,320 Q300,360 400,320" stroke="#ff6b6b" stroke-width="2" fill="none"/>
  </g>

  <!-- Large aura -->
  <circle cx="200" cy="185" r="165" fill="url(#aura)"/>

  <!-- Orbit rings (Mythic = 4 rings) -->
  <ellipse cx="200" cy="185" rx="135" ry="38" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.25" transform="rotate(-15,200,185)"/>
  <ellipse cx="200" cy="185" rx="120" ry="42" fill="none" stroke="#ff6b6b" stroke-width="0.8" opacity="0.2" transform="rotate(40,200,185)"/>
  <ellipse cx="200" cy="185" rx="105" ry="35" fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.18" transform="rotate(-60,200,185)"/>
  <ellipse cx="200" cy="185" rx="90" ry="30" fill="none" stroke="#ff6b6b" stroke-width="0.5" opacity="0.12" transform="rotate(75,200,185)"/>

  <!-- Main orb glow layers -->
  <circle cx="200" cy="185" r="100" fill="#ff6b6b" opacity="0.06" filter="url(#g4)"/>
  <circle cx="200" cy="185" r="82" fill="#FFD700" opacity="0.06" filter="url(#g4)"/>
  <circle cx="200" cy="185" r="78" fill="#ff6b6b" opacity="0.15" filter="url(#g3)"/>

  <!-- Main orb -->
  <circle cx="200" cy="185" r="72" fill="url(#orb)"/>
  <circle cx="200" cy="185" r="72" fill="url(#orbInner)"/>

  <!-- Orb surface -->
  <ellipse cx="176" cy="155" rx="34" ry="26" fill="#fff" opacity="0.1" transform="rotate(-15,176,155)"/>
  <ellipse cx="173" cy="150" rx="15" ry="10" fill="#fff" opacity="0.22" transform="rotate(-15,173,150)"/>

  <!-- Code symbol -->
  <text x="200" y="193" fill="#fff" font-size="28" text-anchor="middle" font-family="monospace" opacity="0.55">&lt;/&gt;</text>

  <!-- Inner circuit (Code spec) -->
  <g opacity="0.15">
    <line x1="168" y1="200" x2="180" y2="200" stroke="#FFD700" stroke-width="1"/>
    <line x1="180" y1="200" x2="180" y2="218" stroke="#FFD700" stroke-width="1"/>
    <line x1="220" y1="168" x2="232" y2="168" stroke="#FFD700" stroke-width="1"/>
    <line x1="220" y1="168" x2="220" y2="152" stroke="#FFD700" stroke-width="1"/>
    <circle cx="180" cy="218" r="2" fill="#FFD700"/>
    <circle cx="220" cy="152" r="2" fill="#FFD700"/>
  </g>

  <!-- Orbiting particles (Mythic = 5 particles with varied colors) -->
  <circle cx="68" cy="140" r="7" fill="#FFD700" filter="url(#g1)" opacity="0.7"/>
  <circle cx="68" cy="140" r="3.5" fill="#fff" opacity="0.8"/>

  <circle cx="325" cy="235" r="6" fill="#ff6b6b" filter="url(#g1)" opacity="0.65"/>
  <circle cx="325" cy="235" r="3" fill="#fff" opacity="0.8"/>

  <circle cx="245" cy="55" r="6.5" fill="#FFD700" filter="url(#g1)" opacity="0.7"/>
  <circle cx="245" cy="55" r="3" fill="#fff" opacity="0.9"/>

  <circle cx="120" cy="295" r="5.5" fill="#ff6b6b" filter="url(#g1)" opacity="0.6"/>
  <circle cx="120" cy="295" r="2.5" fill="#fff" opacity="0.8"/>

  <circle cx="290" cy="90" r="5" fill="#FFD700" filter="url(#g1)" opacity="0.5"/>
  <circle cx="290" cy="90" r="2" fill="#fff" opacity="0.8"/>

  <!-- Crown above orb (Mythic exclusive) -->
  <g opacity="0.5">
    <polygon points="176,100 182,82 192,96 200,72 208,96 218,82 224,100" fill="none" stroke="#FFD700" stroke-width="1.5" filter="url(#g5)"/>
    <circle cx="200" cy="72" r="3" fill="#FFD700" filter="url(#g1)"/>
  </g>

  <!-- Ground reflection -->
  <ellipse cx="200" cy="318" rx="75" ry="14" fill="#ff6b6b" opacity="0.06" filter="url(#g2)"/>

  <text x="200" y="352" fill="#FFD700" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold" filter="url(#g5)">Agent #1</text>
  <text x="200" y="352" fill="#FFD700" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Agent #1</text>
  <text x="200" y="372" fill="#665" font-size="10" text-anchor="middle" font-family="monospace">Lv.10 Gold | Code | Mythic</text>
</svg>