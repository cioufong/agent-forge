<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a10"/>
      <stop offset="100%" stop-color="#060c06"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7dffb3"/>
      <stop offset="40%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#0a6b2a"/>
    </radialGradient>
    <radialGradient id="orbInner" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="g4"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Gold frame double -->
  <rect x="5" y="5" width="390" height="390" rx="16" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.7"/>
  <rect x="12" y="12" width="376" height="376" rx="12" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.3"/>

  <!-- Aura -->
  <circle cx="200" cy="185" r="150" fill="url(#aura)"/>

  <!-- Orbit rings (Epic = 2 rings) -->
  <ellipse cx="200" cy="185" rx="125" ry="38" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.3" transform="rotate(-25,200,185)"/>
  <ellipse cx="200" cy="185" rx="110" ry="42" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.2" transform="rotate(30,200,185)"/>

  <!-- Main orb glow -->
  <circle cx="200" cy="185" r="90" fill="#2ecc71" opacity="0.08" filter="url(#g4)"/>
  <circle cx="200" cy="185" r="72" fill="#2ecc71" opacity="0.15" filter="url(#g3)"/>

  <!-- Main orb -->
  <circle cx="200" cy="185" r="68" fill="url(#orb)"/>
  <circle cx="200" cy="185" r="68" fill="url(#orbInner)"/>

  <!-- Orb surface -->
  <ellipse cx="180" cy="160" rx="30" ry="22" fill="#fff" opacity="0.1" transform="rotate(-15,180,160)"/>
  <ellipse cx="176" cy="155" rx="14" ry="9" fill="#fff" opacity="0.18" transform="rotate(-15,176,155)"/>

  <!-- Code symbol -->
  <text x="200" y="193" fill="#fff" font-size="28" text-anchor="middle" font-family="monospace" opacity="0.5">&lt;/&gt;</text>

  <!-- Circuit lines inside orb -->
  <g opacity="0.15">
    <line x1="165" y1="200" x2="180" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="180" y1="200" x2="180" y2="215" stroke="#fff" stroke-width="1"/>
    <line x1="220" y1="170" x2="235" y2="170" stroke="#fff" stroke-width="1"/>
    <line x1="220" y1="170" x2="220" y2="155" stroke="#fff" stroke-width="1"/>
    <circle cx="180" cy="215" r="2" fill="#fff"/>
    <circle cx="220" cy="155" r="2" fill="#fff"/>
  </g>

  <!-- Orbiting particles (Epic = 3 particles) -->
  <circle cx="82" cy="160" r="5" fill="#7dffb3" filter="url(#g1)" opacity="0.7"/>
  <circle cx="82" cy="160" r="2.5" fill="#fff" opacity="0.8"/>

  <circle cx="305" cy="215" r="4.5" fill="#2ecc71" filter="url(#g1)" opacity="0.6"/>
  <circle cx="305" cy="215" r="2" fill="#fff" opacity="0.8"/>

  <circle cx="220" cy="75" r="4" fill="#7dffb3" filter="url(#g1)" opacity="0.7"/>
  <circle cx="220" cy="75" r="2" fill="#fff" opacity="0.9"/>

  <!-- Ground reflection -->
  <ellipse cx="200" cy="312" rx="65" ry="10" fill="#2ecc71" opacity="0.06" filter="url(#g2)"/>

  <text x="200" y="350" fill="#FFD700" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Agent #42</text>
  <text x="200" y="370" fill="#556" font-size="10" text-anchor="middle" font-family="monospace">Lv.5 Gold | Code | Epic</text>
</svg>