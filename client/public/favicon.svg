<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" rx="4" fill="#0a0a0f"/>
  <!-- Crystal top -->
  <rect x="14" y="4" width="4" height="2" fill="#7dd3fc"/>
  <rect x="12" y="6" width="8" height="2" fill="#38bdf8"/>
  <rect x="10" y="8" width="12" height="2" fill="#0ea5e9"/>
  <!-- Crystal body -->
  <rect x="10" y="10" width="12" height="2" fill="#0284c7"/>
  <rect x="12" y="12" width="8" height="2" fill="#0369a1"/>
  <rect x="12" y="14" width="8" height="2" fill="#0369a1"/>
  <rect x="14" y="16" width="4" height="2" fill="#075985"/>
  <!-- Crystal bottom point -->
  <rect x="14" y="18" width="4" height="2" fill="#075985"/>
  <rect x="15" y="20" width="2" height="2" fill="#0c4a6e"/>
  <!-- Shine -->
  <rect x="12" y="8" width="2" height="2" fill="#bae6fd"/>
  <rect x="12" y="10" width="2" height="2" fill="#7dd3fc"/>
  <!-- A letter (Agent) -->
  <rect x="14" y="24" width="4" height="2" fill="#c8a84e"/>
  <rect x="13" y="26" width="2" height="2" fill="#c8a84e"/>
  <rect x="17" y="26" width="2" height="2" fill="#c8a84e"/>
</svg>
